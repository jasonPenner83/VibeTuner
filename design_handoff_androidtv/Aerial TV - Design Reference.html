  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

sub:'Seconds held for instant rewind',pct:60},\n      ]},\n      parental:{title:'Parental Controls',rows:[\n        {t:'toggle',label:'Content lock',sub:'Require PIN for restricted content',on:true},\n        {t:'select',label:'Maximum rating',sub:'Highest rating allowed without PIN',val:'TV-14'},\n        {t:'nav',label:'Change PIN',sub:'4-digit access code',val:'••••'},\n        {t:'toggle',label:'Purchase approval',sub:'Require PIN to buy or rent',on:true},\n      ]},\n      about:{title:'About',rows:[\n        {t:'info',label:'Software version',sub:'Current build',val:'Aerial OS 14.2'},\n        {t:'info',label:'Device',sub:'Registered name',val:'Living Room TV'},\n        {t:'info',label:'Storage',sub:'Available for recordings',val:'38.2 GB free'},\n        {t:'nav',label:'Check for updates',sub:'Last checked today',val:''},\n        {t:'nav',label:'Legal & licences',sub:'Terms, privacy and open source',val:''},\n      ]},\n    };\n    return C[this.state.settingsSection]||C.display;\n  }\n  switcherChannels(){\n    const cats=this.cats();\n    return this.schedule().map((ch,i)=>{\n      const now=ch.progs[1]?ch.progs[1][0]:ch.progs[0][0];\n      const next=ch.progs[2]?ch.progs[2][0]:'—';\n      const active=i===this.state.switchIdx;\n      return {num:ch.num,name:ch.name,abbr:ch.abbr,now,next,catLabel:cats[ch.cat].label,catColor:cats[ch.cat].color,active,\n        go:()=>this.setState({switchIdx:i}),\n        style:`flex:none;width:300px;border-radius:14px;padding:18px;text-align:left;cursor:pointer;border:2px solid ${active?'var(--accent)':'var(--line)'};background:${active?'var(--raised)':'rgba(21,24,33,.72)'};color:var(--txt);transform:${active?'scale(1.04)':'scale(1)'};box-shadow:${active?'0 14px 34px -10px rgba(0,0,0,.7),0 0 0 5px var(--glow)':'none'}`};\n    });\n  }\n  profiles(){\n    return [\n      {name:'Jordan',tone:'#46507a,#2a3052',init:'J',active:true},\n      {name:'Sam',tone:'#7c5a9e,#4a3568',init:'S',active:false},\n      {name:'Avery',tone:'#3d8a7a,#225048',init:'A',active:false},\n      {name:'Kids',tone:'#b07a3a,#6e4a22',init:'K',active:false,kid:true},\n    ];\n  }\n\n  // build channels with positioned cells\n  buildRows(){\n    const cats=this.cats(), PX=this.PX(), START=this.START(), NOW=this.NOW();\n    return this.schedule().map((ch,ri)=>{\n      let t=START;\n      const cells=ch.progs.map((p,ci)=>{\n        const [title,dur]=p; const start=t; t+=dur;\n        const live = start<=NOW && start+dur>NOW;\n        const focused = this.state.focus.r===ri && this.state.focus.c===ci;\n        const w = dur*PX-6;\n        const cat=cats[ch.cat];\n        const base = focused\n          ? `flex:none;width:${w}px;height:82px;margin-right:6px;border-radius:11px;padding:13px 17px;text-align:left;cursor:pointer;background:var(--raised);border:2px solid var(--accent);transform:scale(1.05);transform-origin:center;box-shadow:0 14px 34px -8px rgba(0,0,0,.7),0 0 0 5px var(--glow);z-index:5;position:relative;color:var(--txt);overflow:hidden`\n          : `flex:none;width:${w}px;height:82px;margin-right:6px;border-radius:11px;padding:13px 17px;text-align:left;cursor:pointer;background:${live?'var(--surface)':'rgba(21,24,33,.6)'};border:1px solid var(--line);color:var(--txt);overflow:hidden;border-left:3px solid ${cat.color}`;\n        return { title, start:this.fmt(start), live, w, focused, style:base, focusThis:()=>this.setState({focus:{r:ri,c:ci}}) };\n      });\n      return { num:ch.num, name:ch.name, abbr:ch.abbr, catColor:cats[ch.cat].color, catLabel:cats[ch.cat].label, cells };\n    });\n  }\n\n  focusedProgram(){\n    const cats=this.cats(), START=this.START(), NOW=this.NOW();\n    const ch=this.schedule()[this.state.focus.r] || this.schedule()[0];\n    let t=START; const out=[];\n    ch.progs.forEach(p=>{ out.push({title:p[0],dur:p[1],start:t}); t+=p[1]; });\n    const idx=Math.min(this.state.focus.c, out.length-1);\n    const cur=out[idx]; const nxt=out[idx+1];\n    const cat=cats[ch.cat];\n    const l \n      isSettings:screen==='settings', isPlayback:screen==='playback', isSwitcher:screen==='switcher',\n      isSignin:screen==='signin', isModals:screen==='modals', isStates:screen==='states',\n      isStub: !this.built().includes(screen),\n      rows:this.buildRows(), timeSlots:slots,\n      nowLineLeft: 320 + (this.NOW()-this.START())*this.PX(),\n      fp:this.focusedProgram(),\n      rails:this.homeRails(),\n      setSections:this.settingsSections().map(s=>({...s,\n        go:()=>this.setState({settingsSection:s.id}),\n        active:this.state.settingsSection===s.id,\n        style:`display:flex;flex-direction:column;gap:3px;padding:16px 20px;border-radius:13px;border:none;cursor:pointer;text-align:left;font-family:'Sora',sans-serif;position:relative;background:${this.state.settingsSection===s.id?'var(--raised)':'transparent'};color:var(--txt)`})),\n      setActive:this.settingsContent(),\n      setRows:this.settingsContent().rows.map((r,i)=>({...r,\n        isToggle:r.t==='toggle', isSlider:r.t==='slider', isChevron:r.t==='select'||r.t==='nav', isInfo:r.t==='info',\n        first:i===0,\n        valColor:r.danger?'var(--danger)':(r.t==='info'?'var(--txt2)':'var(--txt)'),\n        labelColor:r.danger?'var(--danger)':'var(--txt)',\n        fill:`position:absolute;top:0;left:0;bottom:0;width:${r.pct||0}%;border-radius:4px;background:var(--accent)`,\n        knob:`position:absolute;top:3px;${r.on?'left:25px':'left:3px'};width:22px;height:22px;border-radius:50%;background:#fff;transition:left .18s;box-shadow:0 2px 5px rgba(0,0,0,.4)`,\n        track:`width:52px;height:28px;border-radius:16px;position:relative;flex:none;background:${r.on?'var(--accent)':'var(--line)'}`})),\n      switchChans:this.switcherChannels(),\n      swatches:[\n        {name:'Background', token:'--bg', c:'var(--bg)'},\n        {name:'Surface', token:'--surface', c:'var(--surface)'},\n        {name:'Accent', token:'--accent', c:'var(--accent)'},\n        {name:'Text', token:'--txt', c:'var(--
